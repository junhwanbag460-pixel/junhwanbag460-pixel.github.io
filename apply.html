<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>지원 입력</title>
</head>

<body>

<h2>지원 정보 입력</h2>

<form id="form">

이름  
<input id="name"><br><br>

학점 (4.3)  
<input id="gpa" type="number" step="0.01"><br><br>

어학 종류  

<select id="language">
<option value="TOEFL">TOEFL</option>
<option value="IELTS">IELTS</option>
<option value="ITP">기관토플</option>
</select>

<br><br>

어학 점수  
<input id="score"><br><br>

지원대학1  
<input id="c1"><br>

지원대학2  
<input id="c2"><br>

지원대학3  
<input id="c3"><br>

지원대학4  
<input id="c4"><br>

지원대학5  
<input id="c5"><br><br>

<button type="submit">제출</button>

</form>

<script src="script.js"></script>

</body>
</html>
