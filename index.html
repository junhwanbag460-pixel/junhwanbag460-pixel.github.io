<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>교환학생 모의지원</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
width:600px;
margin:auto;
background:white;
padding:30px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#3498db;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<header>
교환학생 모의지원 시스템
</header>

<div class="container">

<h2>지원 정보 입력</h2>

이름
<input id="name">

학점
<input id="gpa">

어학 시험
<select id="test">
<option value="toefl">TOEFL</option>
<option value="ielts">IELTS</option>
<option value="inst">기관TOEFL</option>
</select>

어학 점수
<input id="language">

<button onclick="calculate()">지원하기</button>

<div class="result" id="result"></div>

</div>

<script>

/* 환산표 */

const instToefl = {
677:120,673:120,670:119,667:118,663:117,657:116,653:115,650:114,
647:113,643:112,640:111,637:110,633:109,630:108,627:107,623:106,
620:105,617:104,613:103,610:102,607:101,603:100,600:99,597:98,
593:97,590:96,587:95,583:93,580:92,577:91,573:89,570:88,
567:87,563:85,560:83,557:82,553:81,550:80
}

const ieltsToefl = {
9:120,
8:112,
7.5:107,
7:99,
6.5:92,
6:80
}

function convertLanguage(test,score){

score=parseFloat(score)

/* TOEFL 그대로 */

if(test=="toefl"){
return score
}

/* IELTS 환산 */

if(test=="ielts"){
return ieltsToefl[score] || 0
}

/* 기관토플 환산 */

if(test=="inst"){

let keys=Object.keys(instToefl).map(Number).sort((a,b)=>b-a)

for(let k of keys){
if(score>=k){
return instToefl[k]
}
}

}

return 0
}

function calculate(){

let name=document.getElementById("name").value
let gpa=parseFloat(document.getElementById("gpa").value)
let test=document.getElementById("test").value
let language=document.getElementById("language").value

let converted=convertLanguage(test,language)

/* 총점 계산 */

let total=(gpa*50)+(converted*0.4)+10

document.getElementById("result").innerHTML=
name+"<br>환산 TOEFL 점수: "+converted+
"<br>총점: "+total.toFixed(2)

}

</script>

</body>
</html>
