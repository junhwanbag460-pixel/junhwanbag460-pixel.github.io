<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>경희대학교 교환학생 모의지원</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:40px;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
}

button{
padding:10px;
margin-top:10px;
}

#form{
display:none;
}

</style>

</head>

<body>

<h2>경희대학교 교환학생 모의지원</h2>

<div id="loginBtn"></div>

<div id="form">

<p id="emailDisplay"></p>

<h3>지원 정보 입력</h3>

이름
<input id="name">

학점 (4.3)
<input id="gpa" type="number" step="0.01">

어학 시험
<select id="language">
<option value="toefl">TOEFL</option>
<option value="ielts">IELTS</option>
<option value="institution">기관토플</option>
</select>

어학 점수
<input id="languageScore" type="number">

<h3>지원 대학</h3>

<input id="uni1" placeholder="1지망">
<input id="uni2" placeholder="2지망">
<input id="uni3" placeholder="3지망">
<input id="uni4" placeholder="4지망">
<input id="uni5" placeholder="5지망">

<button onclick="submitForm()">지원 제출</button>

</div>

<script>

let email=""

window.onload=function(){

google.accounts.id.initialize({
client_id:"921438929134-p78aqn2dv6p9mka6orajf0c6c841qrnj.apps.googleusercontent.com",
callback:handleCredentialResponse,
auto_select:false
})

google.accounts.id.renderButton(
document.getElementById("loginBtn"),
{theme:"outline",size:"large"}
)

}

function handleCredentialResponse(response){

const data=JSON.parse(atob(response.credential.split('.')[1]))

email=data.email

if(!email.endsWith("@khu.ac.kr")){
alert("경희대학교 이메일만 로그인 가능합니다")
return
}

document.getElementById("loginBtn").style.display="none"
document.getElementById("form").style.display="block"

document.getElementById("emailDisplay").innerText="로그인: "+email

}

function calculateScore(){

let gpa=Number(document.getElementById("gpa").value)

let gpaScore=(gpa/4.3)*50

let type=document.getElementById("language").value

let lang=Number(document.getElementById("languageScore").value)

let langScore=0

if(type=="toefl"){
langScore=(lang/120)*40
}

if(type=="ielts"){
langScore=(lang/9)*40
}

if(type=="institution"){
langScore=(lang/677)*40
}

return gpaScore+langScore+10

}

function submitForm(){

let total=calculateScore()

let data={

email:email,
name:document.getElementById("name").value,
gpa:document.getElementById("gpa").value,
language:document.getElementById("language").value,
score:total,

uni1:document.getElementById("uni1").value,
uni2:document.getElementById("uni2").value,
uni3:document.getElementById("uni3").value,
uni4:document.getElementById("uni4").value,
uni5:document.getElementById("uni5").value

}

fetch("https://script.google.com/macros/s/AKfycbwESU3boFchpmUqo6oMj4_JM0c92nzFsL2kUgjWomp1av9Ywa9783-tP7zjZB-EY0VN/exec",{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(result=>{

if(result=="updated"){
alert("지원 대학 수정 완료")
}else{
alert("지원 완료")
}

})

}

</script>

</body>
</html>
