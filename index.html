<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>교환학생 모의지원 시스템</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
width:600px;
margin:auto;
background:white;
padding:30px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#3498db;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

.result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<header>
교환학생 모의지원 사이트
</header>

<div class="container">

<h2>지원 정보 입력</h2>

이름
<input id="name">

학점
<input id="gpa">

어학시험 종류
<select id="test">
<option value="toefl">TOEFL</option>
<option value="ielts">IELTS</option>
<option value="inst">기관TOEFL</option>
</select>

어학점수
<input id="language">

<button onclick="calculate()">지원하기</button>

<div class="result" id="result"></div>

</div>

<script>

function convertLanguage(test,score){

score=parseFloat(score);

if(test=="toefl"){
return score;
}

if(test=="ielts"){
return score*12;
}

if(test=="inst"){
return (score-550)*0.2+80;
}

}

function calculate(){

var name=document.getElementById("name").value;
var gpa=parseFloat(document.getElementById("gpa").value);
var test=document.getElementById("test").value;
var language=document.getElementById("language").value;

var converted=convertLanguage(test,language);

var total=(gpa*50)+(converted*0.4)+10;

document.getElementById("result").innerHTML=
name+"님의 환산 어학점수: "+converted.toFixed(1)+"<br>총점: "+total.toFixed(2);

}

</script>

</body>
</html>
