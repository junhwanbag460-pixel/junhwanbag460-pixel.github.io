<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>교환학생 모의지원 시스템</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
width:650px;
margin:auto;
background:white;
padding:30px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#3498db;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
line-height:1.6;
}

</style>

</head>

<body>

<header>
교환학생 모의지원 시스템
</header>

<div class="container">

<h2>지원 정보 입력</h2>

이름
<input id="name">

학점 (4.3 만점)
<input id="gpa">

어학 시험
<select id="test">

<option value="toefl">TOEFL</option>
<option value="ielts">IELTS</option>
<option value="inst">기관TOEFL</option>

</select>

어학 점수
<input id="language">

<h3>지원 대학</h3>

1지망
<select id="uni1">
<option value="">선택 안 함</option>
<option>Tokyo University</option>
<option>National Taiwan University</option>
<option>University of Amsterdam</option>
<option>University of Sydney</option>
</select>

2지망
<select id="uni2">
<option value="">선택 안 함</option>
<option>Tokyo University</option>
<option>National Taiwan University</option>
<option>University of Amsterdam</option>
<option>University of Sydney</option>
</select>

3지망
<select id="uni3">
<option value="">선택 안 함</option>
<option>Tokyo University</option>
<option>National Taiwan University</option>
<option>University of Amsterdam</option>
<option>University of Sydney</option>
</select>

4지망
<select id="uni4">
<option value="">선택 안 함</option>
<option>Tokyo University</option>
<option>National Taiwan University</option>
<option>University of Amsterdam</option>
<option>University of Sydney</option>
</select>

5지망
<select id="uni5">
<option value="">선택 안 함</option>
<option>Tokyo University</option>
<option>National Taiwan University</option>
<option>University of Amsterdam</option>
<option>University of Sydney</option>
</select>

<button onclick="calculate()">지원하기</button>

<div class="result" id="result"></div>

</div>

<script>


async function saveData(data){

await fetch("https://script.google.com/macros/s/AKfycbwESU3boFchpmUqo6oMj4_JM0c92nzFsL2kUgjWomp1av9Ywa9783-tP7zjZB-EY0VN/exec",{

method:"POST",
body:JSON.stringify(data)

});

}


/* IELTS → TOEFL 환산 */

const ieltsToefl = {

9:120,
8:112,
7.5:107,
7:99,
6.5:92,
6:80

}


/* 기관토플 → TOEFL 환산 */

const instToefl = {

677:120,673:120,670:119,667:118,663:117,657:116,
653:115,650:114,647:113,643:112,640:111,637:110,
633:109,630:108,627:107,623:106,620:105,617:104,
613:103,610:102,607:101,603:100,600:99,597:98,
593:97,590:96,587:95,583:93,580:92,577:91,
573:89,570:88,567:87,563:85,560:83,557:82,
553:81,550:80

}


function convertLanguage(test,score){

score=parseFloat(score)

if(test=="toefl"){
return score
}

if(test=="ielts"){
return ieltsToefl[score] || 0
}

if(test=="inst"){

let keys = Object.keys(instToefl).map(Number).sort((a,b)=>b-a)

for(let k of keys){

if(score>=k){
return instToefl[k]
}

}

}

return 0

}


function calculate(){

let name=document.getElementById("name").value
let gpa=parseFloat(document.getElementById("gpa").value)

let test=document.getElementById("test").value
let language=document.getElementById("language").value

let uni1=document.getElementById("uni1").value
let uni2=document.getElementById("uni2").value
let uni3=document.getElementById("uni3").value
let uni4=document.getElementById("uni4").value
let uni5=document.getElementById("uni5").value


let converted=convertLanguage(test,language)


let gpaScore=(gpa/4.3)*50

let languageScore=converted*0.4

let total=gpaScore+languageScore+10


document.getElementById("result").innerHTML=

"<b>"+name+"</b><br><br>"+

"환산 TOEFL 점수 : "+converted+"<br>"+
"학점 점수 : "+gpaScore.toFixed(2)+"<br>"+
"어학 점수 : "+languageScore.toFixed(2)+"<br>"+
"자소서 점수 : 10<br><br>"+

"<b>총점 : "+total.toFixed(2)+"</b><br><br>"+

"지원 대학<br>"+
"1지망 : "+uni1+"<br>"+
"2지망 : "+uni2+"<br>"+
"3지망 : "+uni3+"<br>"+
"4지망 : "+uni4+"<br>"+
"5지망 : "+uni5


saveData({

name:name,
gpa:gpa,
language:converted,
score:total,
uni1:uni1,
uni2:uni2,
uni3:uni3,
uni4:uni4,
uni5:uni5

})

}

</script>

</body>

</html>
