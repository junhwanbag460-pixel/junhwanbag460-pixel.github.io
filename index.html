<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>KHU Exchange Simulator</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:30px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
}

button{
padding:10px;
margin-top:10px;
}

#form{
display:none;
}

</style>

</head>

<body>

<h2>경희대학교 교환학생 모의지원</h2>

<div id="loginSection">

<div id="g_id_onload"
data-client_id="YOUR_CLIENT_ID"
data-callback="handleCredentialResponse"
data-auto_prompt="false"
data-auto_select="false">
</div>

<div class="g_id_signin"
data-type="standard"
data-size="large">
</div>

</div>

<div id="form">

<p id="userEmail"></p>

이름
<input id="name">

학점 (4.3)
<input id="gpa">

어학 시험
<select id="language">

<option value="toefl">TOEFL</option>
<option value="ielts">IELTS</option>
<option value="institution">기관토플</option>

</select>

어학 점수
<input id="languageScore">

<h3>지원 대학</h3>

<input id="uni1" placeholder="1지망">
<input id="uni2" placeholder="2지망">
<input id="uni3" placeholder="3지망">
<input id="uni4" placeholder="4지망">
<input id="uni5" placeholder="5지망">

<button onclick="submitForm()">제출</button>

</div>

<script>

let email=""

function handleCredentialResponse(response){

const data = JSON.parse(atob(response.credential.split('.')[1]))

email = data.email

if(!email.endsWith("@khu.ac.kr")){

alert("경희대학교 이메일만 로그인 가능합니다")

return

}

document.getElementById("loginSection").style.display="none"

document.getElementById("form").style.display="block"

document.getElementById("userEmail").innerText="로그인됨: "+email

}

function calculateScore(){

let gpa = Number(document.getElementById("gpa").value)

let gpaScore = (gpa/4.3)*50

let language = document.getElementById("language").value

let score = Number(document.getElementById("languageScore").value)

let langScore=0

if(language=="toefl"){

langScore=(score/120)*40

}

if(language=="ielts"){

langScore=(score/9)*40

}

if(language=="institution"){

langScore=(score/677)*40

}

return gpaScore+langScore+10

}

function submitForm(){

let data={

email:email,
name:document.getElementById("name").value,
gpa:document.getElementById("gpa").value,
language:document.getElementById("language").value,
score:calculateScore(),

uni1:document.getElementById("uni1").value,
uni2:document.getElementById("uni2").value,
uni3:document.getElementById("uni3").value,
uni4:document.getElementById("uni4").value,
uni5:document.getElementById("uni5").value

}

fetch("YOUR_APPS_SCRIPT_URL",{

method:"POST",
body:JSON.stringify(data)

})

.then(res=>res.text())

.then(result=>{

alert("저장 완료")

})

}

</script>

</body>

</html>
