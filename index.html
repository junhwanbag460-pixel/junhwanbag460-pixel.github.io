<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>교환학생 모의지원 시스템</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
font-size:26px;
}

.container{
width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#3498db;
color:white;
border:none;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

교환학생 모의지원 사이트

</header>

<div class="container">

<h3>경희대학교 이메일 로그인</h3>

<div id="loginDiv"></div>

<p id="loginStatus">로그인 필요</p>

<hr>

<h3>지원 정보 입력</h3>

이름
<input id="name">

학점 (4.3 만점)
<input id="gpa">

어학 시험
<select id="language">
<option value="toefl">TOEFL</option>
<option value="ielts">IELTS</option>
<option value="institution">기관토플</option>
</select>

어학 점수
<input id="score">

<h4>지원 대학 선택</h4>

1지망
<select id="uni1">
<option></option>
<option>University A</option>
<option>University B</option>
<option>University C</option>
</select>

2지망
<select id="uni2">
<option></option>
<option>University A</option>
<option>University B</option>
<option>University C</option>
</select>

3지망
<select id="uni3">
<option></option>
<option>University A</option>
<option>University B</option>
<option>University C</option>
</select>

4지망
<select id="uni4">
<option></option>
<option>University A</option>
<option>University B</option>
<option>University C</option>
</select>

5지망
<select id="uni5">
<option></option>
<option>University A</option>
<option>University B</option>
<option>University C</option>
</select>

<button onclick="submitApplication()">

지원하기

</button>

</div>

<script>

let userEmail="";

window.onload=function(){

google.accounts.id.initialize({
client_id:"921438929134-p78aqn2dv6p9mka6orajf0c6c841qrnj.apps.googleusercontent.com",
callback:handleCredentialResponse
});

google.accounts.id.renderButton(
document.getElementById("loginDiv"),
{ theme:"outline", size:"large"}
);

google.accounts.id.prompt();

}

function handleCredentialResponse(response){

const data=parseJwt(response.credential);

if(!data.email.endsWith("@khu.ac.kr")){
alert("경희대학교 이메일만 사용 가능합니다.");
return;
}

userEmail=data.email;

document.getElementById("loginStatus").innerText="로그인됨: "+userEmail;

}

function parseJwt(token){

var base64Url=token.split('.')[1];
var base64=base64Url.replace(/-/g,'+').replace(/_/g,'/');
var jsonPayload=decodeURIComponent(atob(base64).split('').map(function(c){
return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);
}).join(''));

return JSON.parse(jsonPayload);

}

function calculateScore(gpa,language,score){

let gpaScore=(gpa/4.3)*50;

let langScore=0;

if(language=="toefl"){
langScore=(score/120)*40;
}

if(language=="ielts"){
langScore=(score/9)*40;
}

if(language=="institution"){
langScore=(score/677)*40;
}

let essayScore=10;

return gpaScore+langScore+essayScore;

}

function submitApplication(){

if(userEmail==""){
alert("로그인 먼저 하세요");
return;
}

let name=document.getElementById("name").value;
let gpa=parseFloat(document.getElementById("gpa").value);
let language=document.getElementById("language").value;
let score=parseFloat(document.getElementById("score").value);

let uni1=document.getElementById("uni1").value;
let uni2=document.getElementById("uni2").value;
let uni3=document.getElementById("uni3").value;
let uni4=document.getElementById("uni4").value;
let uni5=document.getElementById("uni5").value;

let total=calculateScore(gpa,language,score);

let data={
email:userEmail,
name:name,
gpa:gpa,
language:language,
score:score,
total:total,
uni1:uni1,
uni2:uni2,
uni3:uni3,
uni4:uni4,
uni5:uni5
};

fetch("YOUR_SCRIPT_URL",{

method:"POST",
body:JSON.stringify(data)

})
.then(res=>res.text())
.then(res=>{

alert("지원 완료");

window.location.href="result.html?email="+userEmail;

});

}

</script>

</body>

</html>
