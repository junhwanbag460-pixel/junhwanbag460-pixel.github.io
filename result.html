<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>지원 결과</title>
</head>

<body>

<h2>지원 결과</h2>

<div id="result"></div>

<script>

const API="APPS_SCRIPT_URL"

const slots={
"SMU":2,
"Tokyo University":2,
"National Taiwan University":2
}

async function load(){

const res=await fetch(API)
const data=await res.json()

const email=localStorage.getItem("email")

const me=data.find(r=>r[0]==email)

if(!me){
document.getElementById("result").innerHTML="지원 정보 없음"
return
}

const total=parseFloat(me[5])

let html=""

for(let i=6;i<=10;i++){

const uni=me[i]

if(!uni) continue

const applicants=data.filter(r=>r.includes(uni))

applicants.sort((a,b)=>b[5]-a[5])

const rank=applicants.findIndex(a=>a[0]==email)+1

const slot=slots[uni]||1

const result=rank<=slot?"합격권":"불합격권"

html+=`

<h3>${uni}</h3>

점수 : ${total}<br>
순위 : ${rank}/${applicants.length}<br>
결과 : ${result}

<hr>

`

}

document.getElementById("result").innerHTML=html

}

load()

</script>

</body>
</html>
