<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>대학교 목록</title>

<style>

body{
font-family:Arial;
padding:40px;
}

.section{
margin-bottom:60px;
}

.uni{
padding:10px;
border:1px solid #ddd;
margin:5px 0;
cursor:pointer;
}

.uni:hover{
background:#f5f5f5;
}

</style>

</head>

<body>

<h1>교환학생 모의지원</h1>

<div class="section">

<h2>내 지원 대학</h2>

<div id="myUniversities"></div>

</div>


<div class="section">

<h2>전체 대학 목록</h2>

<div id="allUniversities"></div>

</div>


<script>

const API="APPS_SCRIPT_URL"

/* 전체 대학 리스트 (관리용) */

const allUniversities=[

"SMU",
"Tokyo University",
"National Taiwan University",
"HKUST",
"NUS",
"University of Amsterdam"

]


async function load(){

const res=await fetch(API)

const data=await res.json()

const email=localStorage.getItem("email")

const me=data.find(r=>r[0]==email)

/* 내가 지원한 대학 */

let myHTML=""

for(let i=6;i<=10;i++){

const uni=me[i]

if(!uni) continue

myHTML+=`

<div class="uni" onclick="go('${uni}')">

${uni}

</div>

`

}

document.getElementById("myUniversities").innerHTML=myHTML



/* 전체 대학 */

let allHTML=""

allUniversities.forEach(uni=>{

allHTML+=`

<div class="uni" onclick="go('${uni}')">

${uni}

</div>

`

})

document.getElementById("allUniversities").innerHTML=allHTML

}



function go(name){

window.location.href="university.html?name="+name

}


load()

</script>

</body>

</html>
