<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>대학교 목록</title>

<style>

body{
font-family:Arial;
padding:40px;
}

.section{
margin-bottom:60px;
}

.uni{
padding:10px;
border:1px solid #ccc;
margin:5px 0;
cursor:pointer;
}

.uni:hover{
background:#f5f5f5;
}

</style>

</head>

<body>

<h1>교환학생 모의지원</h1>


<div class="section">

<h2>내 지원 대학</h2>

<div id="my"></div>

</div>


<div class="section">

<h2>전체 대학 목록</h2>

<div id="all"></div>

</div>



<script>

const API="https://script.google.com/macros/s/AKfycbzknnOviKE3zsA3-SeiJU5F9JMRB_DkiBAy-0w1uIfdh2DQa5xvFtEiSRGAxrAufVSS/exec"


async function load(){

const res=await fetch(API)

const data=await res.json()

const apps=data.applications

const universities=data.universities

const email=localStorage.getItem("email")

const me=apps.find(r=>r[0]==email)



/* 내 지원 대학 */

let myHTML=""

for(let i=6;i<=10;i++){

const uni=me[i]

if(!uni) continue

myHTML+=`<div class="uni" onclick="go('${uni}')">${uni}</div>`

}

document.getElementById("my").innerHTML=myHTML



/* 전체 대학 */

let allHTML=""

for(let i=1;i<universities.length;i++){

const uni=universities[i][0]

allHTML+=`<div class="uni" onclick="go('${uni}')">${uni}</div>`

}

document.getElementById("all").innerHTML=allHTML

}



function go(name){

window.location.href="university.html?name="+name

}


load()

</script>

</body>
</html>
